<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>每日健身计划</title>
<style>
:root{
  --bg:#0f0f13;--bg2:#1a1a24;--bg3:#242433;--card:#1e1e2e;
  --accent:#6c63ff;--accent2:#ff6584;--accent3:#43e97b;
  --text:#f0f0ff;--text2:#9999bb;--text3:#666688;--border:#2a2a40;
  --tab-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;overflow:hidden;}
#app{height:100%;display:flex;flex-direction:column;}
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--tab-h)+8px);display:none;}
.page.active{display:block;}
.page-header{padding:48px 20px 16px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border);}
.page-title{font-size:26px;font-weight:700;}
.page-sub{font-size:13px;color:var(--text2);margin-top:4px;}

/* NAV */
nav{height:var(--tab-h);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;flex-shrink:0;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;cursor:pointer;color:var(--text3);transition:color .2s;}
.tab.active{color:var(--accent);}
.tab svg{width:22px;height:22px;}
.tab span{font-size:10px;font-weight:600;letter-spacing:.3px;}

/* TODAY */
.today-hero{margin:16px;padding:20px;background:linear-gradient(135deg,#1a1a3e,#2a1a4e);border-radius:20px;border:1px solid #3a2a6e;position:relative;overflow:hidden;}
.today-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(108,99,255,.3),transparent 70%);border-radius:50%;}
.today-hero::after{content:'';position:absolute;bottom:-20px;left:-20px;width:80px;height:80px;background:radial-gradient(circle,rgba(67,233,123,.2),transparent 70%);border-radius:50%;}
.hero-day{font-size:12px;color:var(--accent);font-weight:700;letter-spacing:1px;}
.hero-title{font-size:22px;font-weight:800;margin:4px 0 8px;}
.hero-meta{display:flex;gap:16px;flex-wrap:wrap;}
.hero-stat{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);}
.hero-stat svg{width:14px;height:14px;color:var(--accent3);}
.start-btn{margin-top:16px;width:100%;padding:14px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s;}
.start-btn:active{transform:scale(.97);}
.day-strip{display:flex;gap:8px;padding:0 16px 16px;overflow-x:auto;scrollbar-width:none;}
.day-strip::-webkit-scrollbar{display:none;}
.day-chip{flex-shrink:0;width:50px;padding:8px 6px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);text-align:center;cursor:pointer;transition:all .2s;}
.day-chip.active{background:var(--accent);border-color:var(--accent);}
.day-chip.done{border-color:var(--accent3);background:rgba(67,233,123,.1);}
.day-chip .chip-day{font-size:10px;color:var(--text2);}
.day-chip.active .chip-day,.day-chip .chip-num{color:var(--text);}
.day-chip .chip-num{font-size:18px;font-weight:700;}
.day-chip .chip-dot{width:5px;height:5px;border-radius:50%;margin:3px auto 0;}
.day-chip.done .chip-dot{background:var(--accent3);}
.day-chip.active .chip-dot{background:rgba(255,255,255,.6);}

/* EX LIST */
.ex-list{padding:0 16px;display:flex;flex-direction:column;gap:10px;margin-bottom:8px;}
.ex-card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);display:flex;align-items:center;padding:12px 14px;gap:12px;cursor:pointer;transition:transform .15s;position:relative;overflow:hidden;}
.ex-card:active{transform:scale(.98);}
.ex-card.done-ex{border-color:var(--accent3);}
.ex-card.done-ex::before{content:'';position:absolute;inset:0;background:rgba(67,233,123,.05);}
.ex-anim{width:52px;height:52px;border-radius:12px;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:15px;font-weight:600;}
.ex-detail{font-size:12px;color:var(--text2);margin-top:2px;}
.ex-equip-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px;display:inline-block;}
.ex-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.ex-card.done-ex .ex-check{background:var(--accent3);border-color:var(--accent3);}

/* WORKOUT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-width:500px;padding:20px 20px 40px;max-height:92vh;overflow-y:auto;transform:translateY(40px);transition:transform .3s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 16px;}
.modal-anim{width:100%;height:160px;border-radius:16px;background:var(--bg3);margin-bottom:18px;display:flex;align-items:center;justify-content:center;}
.modal-title{font-size:22px;font-weight:800;}
.modal-meta{color:var(--text2);font-size:14px;margin:6px 0 16px;}
.modal-sets{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.set-row{display:flex;align-items:center;gap:12px;background:var(--bg3);border-radius:10px;padding:10px 14px;}
.set-num{width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.set-info{flex:1;font-size:14px;}
.set-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.set-check.checked{background:var(--accent3);border-color:var(--accent3);}
.modal-tips{background:rgba(108,99,255,.1);border-radius:12px;padding:12px;border-left:3px solid var(--accent);font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px;}
.done-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent3),#00c9a7);border:none;border-radius:14px;color:#000;font-size:16px;font-weight:800;cursor:pointer;transition:transform .15s;}
.done-btn:active{transform:scale(.97);}

/* TIMER */
.timer-bar{position:fixed;bottom:calc(var(--tab-h)+12px);left:16px;right:16px;background:var(--bg3);border-radius:16px;border:1px solid var(--accent);padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:90;transform:translateY(120%);transition:transform .3s;}
.timer-bar.show{transform:translateY(0);}
.timer-circle{width:44px;height:44px;flex-shrink:0;position:relative;}
.timer-circle svg{transform:rotate(-90deg);}
.t-bg{fill:none;stroke:var(--border);stroke-width:3;}
.t-fill{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;stroke-dasharray:113;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear;}
.timer-label{font-size:14px;font-weight:600;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.timer-info{flex:1;}
.timer-title{font-size:13px;font-weight:600;}
.timer-sub{font-size:11px;color:var(--text2);}
.timer-skip{padding:6px 14px;border-radius:20px;background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}

/* ══════ PLAN PAGE ══════ */
.schedule-grid{display:flex;flex-direction:column;gap:8px;padding:16px;}
.sched-card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.sched-card.today-sched{border-color:var(--accent);}
.sched-day-col{flex-shrink:0;width:46px;text-align:center;}
.sched-day-name{font-size:11px;color:var(--text2);font-weight:600;}
.sched-day-num{font-size:20px;font-weight:800;}
.sched-divider{width:1px;height:36px;background:var(--border);flex-shrink:0;}
.sched-info{flex:1;min-width:0;}
.sched-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sched-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.sched-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.sched-edit-arrow{font-size:18px;color:var(--text3);flex-shrink:0;}
.today-dot{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--accent);}

/* ══════ EXERCISE EDITOR (full screen) ══════ */
.editor-overlay{position:fixed;inset:0;z-index:200;background:var(--bg);transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;}
.editor-overlay.open{transform:translateY(0);}
.editor-header{padding:48px 16px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg);}
.editor-back{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.editor-title{flex:1;font-size:17px;font-weight:700;}
.editor-save-btn{padding:8px 18px;background:var(--accent);border:none;border-radius:20px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;transition:transform .15s;}
.editor-save-btn:active{transform:scale(.95);}
.rest-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.rest-toggle-label{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;}
.toggle-switch{width:44px;height:24px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);position:relative;cursor:pointer;transition:background .2s;}
.toggle-switch.on{background:var(--accent);border-color:var(--accent);}
.toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;}
.toggle-switch.on::after{transform:translateX(20px);}

/* Muscle tabs */
.muscle-tabs{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid var(--border);}
.muscle-tabs::-webkit-scrollbar{display:none;}
.muscle-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
.muscle-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* Equipment filter */
.equip-filter{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.equip-filter::-webkit-scrollbar{display:none;}
.equip-chip{flex-shrink:0;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;}
.equip-chip.active{border-color:transparent;}

/* Exercise list in editor */
.editor-ex-list{flex:1;overflow-y:auto;padding:8px 16px;}
.editor-ex-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .2s;background:var(--bg2);}
.editor-ex-item.selected{border-color:var(--accent);background:rgba(108,99,255,.1);}
.editor-ex-item.selected::before{display:none;}
.editor-ex-emoji{width:44px;height:44px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.editor-ex-info{flex:1;min-width:0;}
.editor-ex-name{font-size:14px;font-weight:600;}
.editor-ex-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
.editor-ex-reps{font-size:11px;color:var(--text2);}
.editor-equip-badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;}
.editor-checkbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.editor-ex-item.selected .editor-checkbox{background:var(--accent);border-color:var(--accent);}

/* Bottom summary bar */
.editor-bottom{flex-shrink:0;padding:12px 16px 32px;border-top:1px solid var(--border);background:var(--bg2);}
.editor-selected-count{font-size:13px;color:var(--text2);margin-bottom:8px;}
.editor-selected-count strong{color:var(--accent);font-size:16px;}
.editor-selected-pills{display:flex;gap:6px;flex-wrap:wrap;max-height:60px;overflow:hidden;}
.editor-pill{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(108,99,255,.2);color:var(--accent);font-weight:600;white-space:nowrap;}

/* PROGRESS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px;}
.stat-card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);padding:16px;text-align:center;}
.stat-val{font-size:28px;font-weight:800;}
.stat-val.accent{color:var(--accent);}
.stat-val.green{color:var(--accent3);}
.stat-val.pink{color:var(--accent2);}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px;}
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:0 16px 16px;}
.heat-cell{aspect-ratio:1;border-radius:5px;background:var(--bg2);}
.heat-cell.l3{background:var(--accent);}
.heat-cell.today-cell{outline:2px solid var(--accent2);}
.heatmap-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:0 16px 8px;}
.heat-label{text-align:center;font-size:9px;color:var(--text3);}
.history-list{padding:0 16px;display:flex;flex-direction:column;gap:8px;}
.history-item{background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:14px;display:flex;align-items:center;gap:12px;}
.history-dot{width:10px;height:10px;border-radius:50%;background:var(--accent3);flex-shrink:0;}
.history-info{flex:1;}
.history-title{font-size:14px;font-weight:600;}
.history-date{font-size:11px;color:var(--text2);margin-top:2px;}
.history-badge{font-size:11px;color:var(--accent3);font-weight:600;}

/* PROFILE */
.profile-hero{display:flex;align-items:center;gap:16px;padding:24px 20px;}
.avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
.profile-name{font-size:20px;font-weight:700;}
.profile-level{font-size:12px;color:var(--text2);margin-top:2px;}
.settings-list{padding:0 16px;display:flex;flex-direction:column;gap:6px;}
.settings-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg2);border-radius:12px;border:1px solid var(--border);cursor:pointer;}
.settings-icon{font-size:18px;width:36px;text-align:center;}
.settings-label{flex:1;font-size:14px;}
.settings-arrow{color:var(--text3);font-size:16px;}
.level-bar-wrap{padding:0 16px 16px;}
.level-bar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-top:6px;}
.level-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s ease;}
.level-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px;}

/* RING */
.progress-ring-section{padding:16px;display:flex;justify-content:center;}
.ring-wrap{position:relative;display:inline-block;}
.ring-svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--bg3);stroke-width:8;}
.ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* MISC */
.today-complete{background:linear-gradient(135deg,rgba(67,233,123,.15),rgba(0,201,167,.1));border:1px solid rgba(67,233,123,.3);border-radius:16px;padding:20px;margin:0 16px 16px;text-align:center;}
.tc-emoji{font-size:40px;margin-bottom:8px;}
.tc-title{font-size:18px;font-weight:700;color:var(--accent3);}
.tc-sub{font-size:13px;color:var(--text2);margin-top:4px;}
.section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;padding:8px 16px;}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}
.badge-purple{background:rgba(108,99,255,.2);color:var(--accent);}
.badge-pink{background:rgba(255,101,132,.2);color:var(--accent2);}
.badge-green{background:rgba(67,233,123,.2);color:var(--accent3);}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:14px;line-height:1.6;}

/* ANIMATIONS */
@keyframes pushup{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
@keyframes squat{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.75) translateY(4px)}}
@keyframes jump{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes plank{0%,100%{transform:rotate(0deg)}50%{transform:rotate(1deg) translateX(2px)}}
@keyframes crunch{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.85) translateY(4px)}}
@keyframes run{0%,100%{transform:translateX(0) rotate(0deg)}25%{transform:translateX(2px) rotate(2deg)}75%{transform:translateX(-2px) rotate(-2deg)}}
@keyframes stretch{0%,100%{transform:scaleX(1)}50%{transform:scaleX(1.1) scaleY(.9)}}
.anim-pushup{animation:pushup 1.4s ease-in-out infinite;}
.anim-squat{animation:squat 1.2s ease-in-out infinite;transform-origin:bottom center;}
.anim-jump{animation:jump 1s ease-in-out infinite;}
.anim-plank{animation:plank 2s ease-in-out infinite;}
.anim-crunch{animation:crunch 1.5s ease-in-out infinite;transform-origin:bottom center;}
.anim-run{animation:run .6s ease-in-out infinite;}
.anim-stretch{animation:stretch 2s ease-in-out infinite;}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden;}
.lang-btn{position:fixed;top:12px;right:16px;z-index:999;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:700;cursor:pointer;color:var(--text2);transition:border-color .2s;}
.lang-btn .la{color:var(--accent);}
.conf{position:absolute;width:8px;height:8px;border-radius:2px;animation:conf-fall 2s ease-out forwards;}
@keyframes conf-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<button class="lang-btn" onclick="toggleLang()" aria-label="Language toggle"><span id="la-zh" class="la">中</span> | <span id="la-en">EN</span></button>
<div id="app">

  <!-- ══ TODAY ══ -->
  <div class="page active" id="page-today">
    <div class="page-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="page-title" id="greeting">今天</div>
          <div class="page-sub" id="today-date"></div>
        </div>
        <div class="badge badge-purple" id="streak-badge">🔥 <span id="streak-count">0</span> <span id="t-streak-suffix">天连续</span></div>
      </div>
    </div>
    <div class="day-strip" id="day-strip"></div>
    <div class="today-hero">
      <div class="hero-day" id="hero-day-label"></div>
      <div class="hero-title" id="hero-workout-name"></div>
      <div class="hero-meta">
        <div class="hero-stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span id="hero-duration"></span></div>
        <div class="hero-stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><span id="hero-calories"></span></div>
        <div class="hero-stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span id="hero-ex-count"></span></div>
      </div>
      <button class="start-btn" id="t-start-btn" onclick="startWorkout()">开始训练 →</button>
    </div>
    <div class="progress-ring-section">
      <div class="ring-wrap">

  if(s)state={...state,...JSON.parse(s)};

function todayKey(){return new Date().toISOString().slice(0,10);}
function dateKey(d){return d.toISOString().slice(0,10);}
function jsDayToPlanDay(jsDay){return jsDay===0?6:jsDay-1;}

// Get exercise object by ID
function getEx(id){return DB.find(e=>e.id===id);}

// Get workout for a given plan day
function getWorkoutForDay(planDayIdx){
  if((state.restDays[planDayIdx])||(planDayIdx===6&&!state.customExercises[planDayIdx]&&!Object.keys(state.restDays).includes('6'+'') && DEFAULT_REST_DAYS[planDayIdx])){
    return{isRest:true,exercises:[],name:t('rest_workout_name'),icon:'😴',duration:t('rest_workout_duration'),calories:'0 kcal'};
  }
  const ids = state.customExercises[planDayIdx] || DEFAULT_DAY_EXERCISES[planDayIdx] || [];
  if(ids.length===0) return{isRest:true,exercises:[],name:t('rest_workout_name'),icon:'😴',duration:t('rest_workout_duration'),calories:'0 kcal'};
  const exercises = ids.map(id=>getEx(id)).filter(Boolean);
  const muscles=[...new Set(exercises.map(e=>{const mg=MUSCLES.find(m=>m.id===e.muscle);return mg?muscleLabel(mg):e.muscle;}))];
  const duration=Math.round(exercises.length*5+8);
  const calories=Math.round(exercises.length*42+50);
  return{
    isRest:false,
    exercises,
    name:muscles.slice(0,2).join(' + '),
    icon:MUSCLES.find(m=>m.id===exercises[0]?.muscle)?.icon||'💪',
    duration:currentLang==='en'?duration+' min':duration+'分钟',
    calories:calories+' kcal',
  };
}

function renderToday(){
  const today=new Date();
  const jsDay=today.getDay();
  const planDay=jsDayToPlanDay(jsDay);
  const workout=getWorkoutForDay(planDay);

  const h=today.getHours();
  document.getElementById('greeting').textContent=h<12?t('morning'):h<17?t('afternoon'):t('evening');
  document.getElementById('today-date').textContent=today.toLocaleDateString(currentLang==='en'?'en-US':'zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  document.getElementById('streak-count').textContent=calcStreak();

  const monday=new Date(today);
  monday.setDate(today.getDate()-(jsDay===0?6:jsDay-1));
  const strip=document.getElementById('day-strip');
  strip.innerHTML='';
  t('day_chips').forEach((label,i)=>{
    const day=new Date(monday);day.setDate(monday.getDate()+i);
    const dk=dateKey(day);
    const chip=document.createElement('div');
    chip.className='day-chip'+(dk===todayKey()?' active':'')+(state.completedWorkouts.includes(dk)?' done':'');
    chip.innerHTML=`<div class="chip-day">${label}</div><div class="chip-num">${day.getDate()}</div><div class="chip-dot"></div>`;
    strip.appendChild(chip);
  });

  document.getElementById('hero-day-label').textContent=t('day_names')[planDay];
  document.getElementById('hero-workout-name').textContent=workout.name;
  document.getElementById('hero-duration').textContent=workout.duration;
  document.getElementById('hero-calories').textContent=workout.calories;
  document.getElementById('hero-ex-count').textContent=workout.isRest?t('rest_full'):workout.exercises.length+(currentLang==='en'?' exercises':'个动作');

  renderExList(workout);
}

function renderExList(workout){
  const key=todayKey();
  const done=state.completedExercises[key]||{};
  const total=workout.exercises.length;
  const doneCount=workout.exercises.filter(e=>done[e.id]).length;
  const pct=total?Math.round(doneCount/total*100):(workout.isRest?100:0);
  document.getElementById('progress-ring-fill').style.strokeDashoffset=326.7-(326.7*pct/100);
  document.getElementById('ring-pct').textContent=pct+'%';

  const list=document.getElementById('ex-list');
  list.innerHTML='';

  if(workout.isRest){
    list.innerHTML=`<div class="today-complete"><div class="tc-emoji">😴</div><div class="tc-title">${t('rest_state_title')}</div><div class="tc-sub">${t('rest_state_sub')}</div></div>`;
    return;
  }
  if(doneCount===total&&total>0){
    const c=document.createElement('div');c.className='today-complete';
    c.innerHTML=`<div class="tc-emoji">🎉</div><div class="tc-title">${t('done_all_title')}</div><div class="tc-sub">${t('done_all_sub')}</div>`;
    list.appendChild(c);
  }
  workout.exercises.forEach(ex=>{
    const isDone=!!done[ex.id];
    const eq=EQUIP[ex.equip]||EQUIP.bodyweight;
    const card=document.createElement('div');
    card.className='ex-card'+(isDone?' done-ex':'');
    card.onclick=()=>openExercise(ex);
    card.innerHTML=`
      <div class="ex-anim anim-${ex.anim}">${ex.emoji}</div>
      <div class="ex-info">
        <div class="ex-name">${exName(ex)}</div>
        <div class="ex-detail">${ex.sets}${currentLang==='en'?' sets × ':' 组 × '}${ex.reps}</div>
        <span class="ex-equip-tag" style="background:${eq.bg};color:${eq.color}">${equipLabel(ex.equip)}</span>
      </div>
      <div class="ex-check">${isDone?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}</div>`;
    list.appendChild(card);
  });
}

let currentExercise=null,setsDone=[],timerInterval=null,timerSecs=60;
function openExercise(ex){
  currentExercise=ex;
  setsDone=new Array(ex.sets).fill(false);
  const eq=EQUIP[ex.equip]||EQUIP.bodyweight;
  document.getElementById('modal-title').textContent=exName(ex);
  document.getElementById('modal-meta').innerHTML=`${ex.sets}${currentLang==='en'?' sets × ':' 组 × '}${ex.reps} &nbsp;<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${eq.bg};color:${eq.color};font-weight:700">${equipLabel(ex.equip)}</span>`;
  document.getElementById('modal-tips').textContent=t('tip_prefix')+exTip(ex);
  document.getElementById('modal-anim').innerHTML=`<div style="text-align:center"><div class="anim-${ex.anim}" style="display:inline-block;font-size:80px;line-height:1">${ex.emoji}</div><div style="margin-top:12px;font-size:13px;color:var(--text2)">${exName(ex)}</div></div>`;
  const setsEl=document.getElementById('modal-sets');setsEl.innerHTML='';
  for(let i=0;i<ex.sets;i++){const r=document.createElement('div');r.className='set-row';r.innerHTML=`<div class="set-num">${i+1}</div><div class="set-info">${t('set_label')}${i+1}${t('set_suffix')} · ${ex.reps}</div><div class="set-check" id="set-${i}" onclick="toggleSet(${i})"></div>`;setsEl.appendChild(r);}
  const alreadyDone=!!(state.completedExercises[todayKey()]||{})[ex.id];
  if(alreadyDone){setsDone.fill(true);updateSetDisplay();document.getElementById('modal-done-btn').textContent=t('modal_done_already');document.getElementById('modal-done-btn').style.background='var(--bg3)';}
  else{document.getElementById('modal-done-btn').textContent=t('modal_done');document.getElementById('modal-done-btn').style.background='';}
  document.getElementById('modal-overlay').classList.add('open');
}
function updateSetDisplay(){setsDone.forEach((d,i)=>{const el=document.getElementById('set-'+i);if(el){el.className='set-check'+(d?' checked':'');el.innerHTML=d?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':'';}});}
function toggleSet(i){const was=!setsDone[i];setsDone[i]=!setsDone[i];updateSetDisplay();if(was&&setsDone.filter(Boolean).length<setsDone.length)startRestTimer();}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('open');}
function completeExercise(){
  if(!currentExercise)return;
  const key=todayKey();
  if(!state.completedExercises[key])state.completedExercises[key]={};
  state.completedExercises[key][currentExercise.id]=true;
  state.totalExercises=(state.totalExercises||0)+1;
  const w=getWorkoutForDay(jsDayToPlanDay(new Date().getDay()));
  if(w.exercises.every(e=>(state.completedExercises[key]||{})[e.id])&&!state.completedWorkouts.includes(key)){
    state.completedWorkouts.push(key);saveState();
    document.getElementById('modal-overlay').classList.remove('open');
    renderToday();setTimeout(showConfetti,300);return;
  }
  saveState();document.getElementById('modal-overlay').classList.remove('open');renderToday();
}
function startRestTimer(secs=60){
  if(timerInterval)clearInterval(timerInterval);
  timerSecs=secs;
  const total=secs;
  document.getElementById('timer-label').textContent=secs;
  document.getElementById('timer-sub').textContent=secs+t('timer_suffix');
  document.getElementById('timer-bar').classList.add('show');
  timerInterval=setInterval(()=>{
    timerSecs--;
    document.getElementById('timer-label').textContent=timerSecs;
    document.getElementById('timer-sub').textContent=timerSecs+t('timer_suffix');
    document.getElementById('timer-fill').style.strokeDashoffset=113-113*(timerSecs/total);
    if(timerSecs<=0){clearInterval(timerInterval);document.getElementById('timer-bar').classList.remove('show');if(navigator.vibrate)navigator.vibrate([200,100,200]);}
  },1000);
}
function skipTimer(){if(timerInterval)clearInterval(timerInterval);document.getElementById('timer-bar').classList.remove('show');}
function startWorkout(){const w=getWorkoutForDay(jsDayToPlanDay(new Date().getDay()));if(w.exercises.length)openExercise(w.exercises[0]);}

        <div class="sched-chips">${chipsHtml}${!workout.isRest?`<span class="sched-chip" style="background:rgba(67,233,123,.12);color:var(--accent3)">${workout.exercises.length}${currentLang==='en'?' ex':'个动作'}</span>`:''}</div>
      </div>
      <div class="sched-edit-arrow">✏️</div>`;
    grid.appendChild(card);
  }
}

// ══════════════════════════════════════
//  EXERCISE EDITOR
// ══════════════════════════════════════
let editorDayIdx=null;
let editorSelected=[];
let editorActiveMuscle='chest';
let editorActiveEquip='all';
let editorIsRest=false;

function openEditor(dayIdx){
  editorDayIdx=dayIdx;
  editorIsRest=!!(state.restDays[dayIdx]||(dayIdx===6&&!state.customExercises[dayIdx]&&DEFAULT_REST_DAYS[dayIdx]));
  editorSelected=[...(state.customExercises[dayIdx]||DEFAULT_DAY_EXERCISES[dayIdx]||[])];
  editorActiveMuscle='chest';
  editorActiveEquip='all';
  document.getElementById('editor-title').textContent=t('day_names')[dayIdx]+t('edit_title_suffix');
  renderRestToggle();
  renderMuscleTabs();
  renderEquipFilter();
  renderEditorExList();
  renderEditorBottom();
  document.getElementById('editor-overlay').classList.add('open');
}
function closeEditor(){
  document.getElementById('editor-overlay').classList.remove('open');
}
function saveEditor(){
  if(editorIsRest){
    state.restDays[editorDayIdx]=true;
    delete state.customExercises[editorDayIdx];
  } else {
    delete state.restDays[editorDayIdx];
    state.customExercises[editorDayIdx]=[...editorSelected];
  }
  saveState();
  closeEditor();
  renderSchedulePage();
  if(editorDayIdx===jsDayToPlanDay(new Date().getDay()))renderToday();
}

function toggleRestDay(){
  editorIsRest=!editorIsRest;
  renderRestToggle();
  renderEditorExList();
}
function renderRestToggle(){
  const tog=document.getElementById('rest-toggle');
  tog.className='toggle-switch'+(editorIsRest?' on':'');
}

function renderMuscleTabs(){
  const tabs=document.getElementById('muscle-tabs');
  tabs.innerHTML='';
  MUSCLES.forEach(mg=>{
    const hasSelected=editorSelected.some(id=>{const ex=getEx(id);return ex&&ex.muscle===mg.id;});
    const btn=document.createElement('div');
    btn.className='muscle-tab'+(editorActiveMuscle===mg.id?' active':'');
    btn.innerHTML=`${mg.icon} ${muscleLabel(mg)}${hasSelected?` <span style="color:var(--accent3);font-size:10px">✓</span>`:''}`;
    btn.onclick=()=>{editorActiveMuscle=mg.id;editorActiveEquip='all';renderMuscleTabs();renderEquipFilter();renderEditorExList();};
    tabs.appendChild(btn);
  });
}

function renderEquipFilter(){
  const filter=document.getElementById('equip-filter');
  filter.innerHTML='';
  const equipInMuscle=['all',...new Set(DB.filter(e=>e.muscle===editorActiveMuscle).map(e=>e.equip))];
  equipInMuscle.forEach(key=>{
    const eq=key==='all'?{label:t('equip_all'),color:'var(--text)',bg:'var(--bg3)'}:EQUIP[key];
    if(!eq)return;
    const btn=document.createElement('div');
    btn.className='equip-chip'+(editorActiveEquip===key?' active':'');
    btn.style.color=editorActiveEquip===key?'#000':eq.color;
    btn.style.background=editorActiveEquip===key?eq.color:(key==='all'?'var(--bg2)':'transparent');
    btn.style.borderColor=editorActiveEquip===key?'transparent':eq.color;
    btn.textContent=key==='all'?t('equip_all'):equipLabel(key);
    btn.onclick=()=>{editorActiveEquip=key;renderEquipFilter();renderEditorExList();};
    filter.appendChild(btn);
  });
}

function renderEditorExList(){
  const list=document.getElementById('editor-ex-list');
  if(editorIsRest){list.innerHTML=`<div class="empty-state"><div class="empty-icon">😴</div><div class="empty-text">${t('rest_empty_title')}<br>${t('rest_empty_sub')}</div></div>`;return;}
  const filtered=DB.filter(e=>e.muscle===editorActiveMuscle&&(editorActiveEquip==='all'||e.equip===editorActiveEquip));
  if(!filtered.length){list.innerHTML=`<div class="empty-state"><div class="empty-text">${t('no_exercises')}</div></div>`;return;}
  list.innerHTML='';
  filtered.forEach(ex=>{
    const isSelected=editorSelected.includes(ex.id);
    const eq=EQUIP[ex.equip]||EQUIP.bodyweight;
    const item=document.createElement('div');
    item.className='editor-ex-item'+(isSelected?' selected':'');
    item.onclick=()=>toggleEditorEx(ex.id);
    item.innerHTML=`
      <div class="editor-ex-emoji anim-${ex.anim}">${ex.emoji}</div>
      <div class="editor-ex-info">
        <div class="editor-ex-name">${exName(ex)}</div>
        <div class="editor-ex-meta">
          <span class="editor-equip-badge" style="background:${eq.bg};color:${eq.color}">${equipLabel(ex.equip)}</span>
          <span class="editor-ex-reps">${ex.sets}${currentLang==='en'?' sets × ':' 组 × '}${ex.reps}</span>
        </div>
      </div>
      <div class="editor-checkbox">${isSelected?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}</div>`;
    list.appendChild(item);
  });
}

function toggleEditorEx(id){
  if(editorSelected.includes(id))editorSelected=editorSelected.filter(i=>i!==id);
  else editorSelected.push(id);
  renderMuscleTabs();
  renderEditorExList();
  renderEditorBottom();
}

function renderEditorBottom(){
  const count=editorSelected.length;
  document.getElementById('editor-selected-count').innerHTML=`${t('editor_selected')} <strong>${count}</strong> ${t('editor_selected_unit')}${count>0?` · ${t('editor_est')} ${Math.round(count*5+8)} ${t('editor_est_suffix')}`:''}`;
  const pills=document.getElementById('editor-selected-pills');
  pills.innerHTML=editorSelected.slice(0,8).map(id=>{
    const ex=getEx(id);
    return ex?`<div class="editor-pill">${ex.emoji} ${exName(ex)}</div>`:'';
  }).join('')+(editorSelected.length>8?`<div class="editor-pill">+${editorSelected.length-8}</div>`:'');
}

// ══════════════════════════════════════
//  PROGRESS
// ══════════════════════════════════════
function calcStreak(){
  let streak=0;const today=new Date();
  for(let i=0;i<365;i++){const d=new Date(today);d.setDate(today.getDate()-i);if(state.completedWorkouts.includes(dateKey(d)))streak++;else if(i>0)break;}
  return streak;
}
function renderProgress(){
  const streak=calcStreak(),total=state.completedWorkouts.length;
  const today=new Date(),jsDay=today.getDay();
  const ws=new Date(today);ws.setDate(today.getDate()-(jsDay===0?6:jsDay-1));
  let wk=0;for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);if(state.completedWorkouts.includes(dateKey(d)))wk++;}
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-streak').textContent=streak;
  document.getElementById('stat-week').textContent=wk;
  document.getElementById('stat-exercises').textContent=state.totalExercises||0;
  document.getElementById('progress-sub').textContent=currentLang==='en'?`${t('history_total')} ${total} ${t('history_total_suffix')}`:`共完成 ${total} 次训练`;
  document.getElementById('heatmap-labels').innerHTML=t('day_chips').map(d=>`<div class="heat-label">${d}</div>`).join('');
  const hm=document.getElementById('heatmap');hm.innerHTML='';
  const monday=new Date(today);monday.setDate(today.getDate()-(jsDay===0?6:jsDay-1)-21);
  for(let i=0;i<28;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);const dk=dateKey(d);const cell=document.createElement('div');cell.className='heat-cell'+(state.completedWorkouts.includes(dk)?' l3':'')+(dk===todayKey()?' today-cell':'');hm.appendChild(cell);}
  const histList=document.getElementById('history-list');
  if(!state.completedWorkouts.length){histList.innerHTML=`<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">${currentLang==='en'?'No workouts yet<br>Complete today\'s workout to start!':'还没有训练记录<br>完成今天的训练开始积累吧！'}</div></div>`;return;}
  histList.innerHTML=[...state.completedWorkouts].sort((a,b)=>b.localeCompare(a)).slice(0,20).map(dk=>{
    const d=new Date(dk);const w=getWorkoutForDay(jsDayToPlanDay(d.getDay()));
    return`<div class="history-item"><div class="history-dot"></div><div class="history-info"><div class="history-title">${w.icon} ${w.name}</div><div class="history-date">${d.toLocaleDateString(currentLang==='en'?'en-US':'zh-CN',{month:'long',day:'numeric'})} · ${t('history_days')[d.getDay()]}</div></div><div class="history-badge">${t('history_badge')}</div></div>`;
  }).join('');
}

// ══════════════════════════════════════
//  PROFILE
// ══════════════════════════════════════
function renderProfile(){
  const total=state.completedWorkouts.length,level=Math.floor(total/5)+1,xp=(total%5)*20;
  document.getElementById('profile-name').textContent=state.name||'健身达人';
  const titles=t('level_titles');
  document.getElementById('profile-level-text').textContent=titles[Math.min(Math.floor((level-1)/4),4)]+' · Lv.'+level;
  document.getElementById('level-xp-text').textContent=xp+' '+t('xp_of');
  document.getElementById('level-bar-fill').style.width=xp+'%';
  document.getElementById('t-xp-label').textContent=t('xp_label');
}
function editName(){const n=prompt(t('edit_name_prompt'),state.name||'健身达人');if(n){state.name=n;saveState();renderProfile();}}
function toggleTheme(){state.theme=((state.theme||0)+1)%THEMES.length;const t=THEMES[state.theme];document.documentElement.style.setProperty('--accent',t.accent);document.documentElement.style.setProperty('--accent2',t.accent2);document.documentElement.style.setProperty('--accent3',t.accent3);saveState();}
function resetProgress(){if(confirm(t('reset_confirm'))){state.completedExercises={};state.completedWorkouts=[];state.totalExercises=0;saveState();renderToday();renderProfile();}}

// ══════════════════════════════════════
//  CONFETTI
// ══════════════════════════════════════
function showConfetti(){
  const wrap=document.getElementById('confetti-wrap');wrap.innerHTML='';
  const colors=['#6c63ff','#ff6584','#43e97b','#f7971e','#4facfe','#f093fb'];
  for(let i=0;i<60;i++){const c=document.createElement('div');c.className='conf';c.style.left=Math.random()*100+'vw';c.style.top='-10px';c.style.background=colors[Math.floor(Math.random()*colors.length)];c.style.animationDelay=Math.random()+'s';c.style.animationDuration=(1.5+Math.random())+'s';wrap.appendChild(c);}
  setTimeout(()=>wrap.innerHTML='',3000);
}

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
loadState();
applyI18n();
renderToday();
if(state.theme&&THEMES[state.theme]){const th=THEMES[state.theme];document.documentElement.style.setProperty('--accent',th.accent);document.documentElement.style.setProperty('--accent2',th.accent2);document.documentElement.style.setProperty('--accent3',th.accent3);}
</script>
